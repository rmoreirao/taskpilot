name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). If empty, uses the current Cargo.toml version."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Sign binaries
        if: env.CODE_SIGNING_CERT_PFX != ''
        env:
          CODE_SIGNING_CERT_PFX: ${{ secrets.CODE_SIGNING_CERT_PFX }}
          CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          # Decode PFX certificate from base64 secret
          $pfxPath = Join-Path $env:RUNNER_TEMP "code_signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGNING_CERT_PFX))

          # Locate signtool.exe from Windows SDK
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
              Where-Object { $_.FullName -match "x64" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          Write-Host "Using signtool: $signtool"

          # Sign each binary
          foreach ($exe in @("target\release\taskpilot.exe", "target\release\taskpilot-cli.exe")) {
              Write-Host "Signing $exe ..."
              & $signtool sign /f $pfxPath /p $env:CODE_SIGNING_CERT_PASSWORD `
                  /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
                  /d "TaskPilot" $exe
              if ($LASTEXITCODE -ne 0) { throw "Signing failed for $exe" }

              Write-Host "Verifying $exe ..."
              & $signtool verify /pa /v $exe
              if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for $exe" }
          }

          # Clean up
          Remove-Item $pfxPath -Force

      - name: Determine version tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.tag }}") {
              $tag = "${{ github.event.inputs.tag }}"
          } elseif ($env:GITHUB_REF -match '^refs/tags/(.+)$') {
              $tag = $Matches[1]
          } else {
              # Read version from Cargo.toml
              $cargo = Get-Content Cargo.toml -Raw
              if ($cargo -match 'version\s*=\s*"([^"]+)"') {
                  $tag = "v$($Matches[1])"
              } else {
                  $tag = "v0.0.0"
              }
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Version tag: $tag"

      - name: Create zip archive
        shell: pwsh
        run: |
          $staging = "taskpilot-${{ steps.version.outputs.tag }}"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item "target\release\taskpilot.exe" $staging\
          Copy-Item "target\release\taskpilot-cli.exe" $staging\
          Copy-Item "config.example.toml" $staging\
          Copy-Item "README.md" $staging\
          Compress-Archive -Path "$staging\*" -DestinationPath "$staging.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskPilot ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            target/release/taskpilot.exe
            target/release/taskpilot-cli.exe
            taskpilot-${{ steps.version.outputs.tag }}.zip
