name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). If empty, uses the current Cargo.toml version."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Determine version tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.tag }}") {
              $tag = "${{ github.event.inputs.tag }}"
          } elseif ($env:GITHUB_REF -match '^refs/tags/(.+)$') {
              $tag = $Matches[1]
          } else {
              # Read version from Cargo.toml
              $cargo = Get-Content Cargo.toml -Raw
              if ($cargo -match 'version\s*=\s*"([^"]+)"') {
                  $tag = "v$($Matches[1])"
              } else {
                  $tag = "v0.0.0"
              }
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Version tag: $tag"

      - name: Create zip archive
        shell: pwsh
        run: |
          $staging = "taskpilot-${{ steps.version.outputs.tag }}"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item "target\release\taskpilot.exe" $staging\
          Copy-Item "target\release\taskpilot-cli.exe" $staging\
          Copy-Item "config.example.toml" $staging\
          Copy-Item "README.md" $staging\
          Compress-Archive -Path "$staging\*" -DestinationPath "$staging.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TaskPilot ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            target/release/taskpilot.exe
            target/release/taskpilot-cli.exe
            taskpilot-${{ steps.version.outputs.tag }}.zip
