# Multi-task [[task]] array format — external task source

[[task]]
name = "batch-one"
command = "echo Batch task one"
cron = "*/15 * * * *"
timeout = "10s"
notify_on_failure = false
shell = "cmd"

[[task]]
name = "batch-two"
command = "echo Batch task two"
cron = "*/15 * * * *"
timeout = "10s"
notify_on_failure = false
shell = "cmd"
