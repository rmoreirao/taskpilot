[general]
log_level = "info"
max_log_retention_days = 30
start_with_windows = true

[notifications]
enabled = true
on_failure = true
on_recovery = true
sound = false

[[jobs]]
name = "example-hello"
command = "echo Hello from TaskPilot!"
cron = "*/5 * * * *"
timeout = "30s"
notify_on_failure = true

[[jobs]]
name = "example-date"
command = "date /t"
cron = "*/2 * * * *"
timeout = "10s"
notify_on_failure = true
