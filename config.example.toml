[general]
log_level = "info"
max_log_retention_days = 30
start_with_windows = true

# Optional global default timezone for cron schedules.
# Uses IANA timezone names, for example:
# default_timezone = "America/New_York"
# default_timezone = "America/Sao_Paulo"
# If omitted, cron schedules use the machine local timezone.

# External task sources — directories containing .toml task definitions.
# Each directory is scanned for .toml files that define tasks.
# Files can use the same [[task]] array format as this config,
# or a flat single-task format (name, command, cron fields at top level).
# task_sources = ["C:\\SharedTasks", "D:\\team-tasks"]

# External task configs — individual .toml task definition files.
# Same format support as task_sources (multi-task or single-task).
# task_configs = ["C:\\SharedTasks\\my-task.toml", "D:\\team\\nightly.toml"]

[notifications]
enabled = true
on_failure = true
on_recovery = true
sound = false

[updates]
# Check GitHub for new releases every 24 hours.
# When an update is found, the dashboard shows a banner and the Settings view
# offers a one-click download and apply.
auto_check = true

[[task]]
name = "example-hello"
command = "Write-Output 'Hello from TaskPilot!'"
cron = "*/5 * * * *"
# timezone = "America/New_York"   # optional per-task override
timeout = "30s"
notify_on_failure = true

# Catch-up missed runs: when TaskPilot starts and finds a task overdue,
# run it immediately. Set to false to skip overdue runs instead.
# run_missed = true   # (default)

[[task]]
name = "example-date"
command = "Get-Date -Format 'yyyy-MM-dd'"
cron = "*/2 * * * *"
# timezone = "America/Sao_Paulo"  # overrides [general].default_timezone
timeout = "10s"
notify_on_failure = true

# Timezone precedence for cron schedules:
# 1. [[task]].timezone
# 2. [general].default_timezone
# 3. machine local timezone

# ── Task triggers (pipelines) ──────────────────────────────────────
# Chain tasks together: when a task finishes, trigger downstream tasks.
# Each trigger specifies a target task and a condition:
#   on = "success"  — fire only when task passes (default)
#   on = "failure"  — fire when task fails or times out
#   on = "always"   — fire regardless of outcome
#
# Trigger-only tasks can omit the cron field entirely.
# Cycles (A → B → A) are detected and rejected at load time.
#
# [[task]]
# name = "build"
# command = "cargo build --release"
# cron = "0 8 * * *"
# triggers = [
#   { task = "test", on = "success" },
#   { task = "alert-team", on = "failure" },
# ]
#
# [[task]]
# name = "test"
# command = "cargo test"
# triggers = [{ task = "deploy", on = "success" }]
#
# [[task]]
# name = "deploy"
# command = "deploy.ps1"

# Commands with Windows paths or embedded quotes: use single-quoted TOML strings
# so that backslashes are treated literally (no escape processing).
# [[task]]
# name = "example-backup"
# command = 'robocopy C:\Data D:\Backup /MIR'
# cron = "0 2 * * *"
# timeout = "10m"

# ── Shell configuration ─────────────────────────────────────────────
# By default, tasks run via cmd /C on Windows and sh -c elsewhere.
# Override per-task or globally to use PowerShell or another shell.
#
# Supported values: "cmd", "powershell", "pwsh", "sh", "bash"
#
# Global default (applies to all tasks without an explicit shell):
# [general]
# default_shell = "pwsh"
#
# Profile loading: PowerShell/pwsh shells load the user's profile by default
# (so that PATH and environment variables are available). Set to false for
# faster startup if your tasks don't need profile-provided settings.
# [general]
# load_profile = false     # adds -NoProfile for faster startup
#
# Per-task override:
# [[task]]
# name = "ps-task"
# command = "Get-ChildItem C:\\Data | Measure-Object"
# shell = "pwsh"
# load_profile = false     # skip profile for this task
# cron = "0 8 * * *"
#
# PowerShell note: non-terminating errors still exit 0.
# Use $ErrorActionPreference = 'Stop' or explicit exit 1 / throw
# when task failure must be detected by TaskPilot.
